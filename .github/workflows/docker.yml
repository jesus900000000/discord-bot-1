name: Build Push Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jesus900000000/discord-bot-1:latest
            ghcr.io/jesus900000000/discord-bot-1:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Restart deployment
        run: |
          kubectl rollout restart deployment discord-bot-1 -n apps
          kubectl rollout status deployment discord-bot-1 -n apps
